name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Rust-Backend (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@v5

      - name: Rust-Toolchain + Komponenten
        run: rustup component add clippy rustfmt

      - name: Cargo-Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-deps-

      - name: Format pruefen
        run: cargo fmt --all -- --check

      - name: Clippy (Warnungen = Fehler)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --all

      - name: PowerShell-Syntax pruefen
        shell: pwsh
        run: |
          $files = @(
            '../../agent/Invoke-Inventory.ps1',
            '../../agent/Invoke-InventoryDebug.ps1',
            '../../agent/deploy/Install-InventoryTask.ps1',
            '../../agent/deploy/Remove-StaleInventory.ps1',
            '../../shared/sample-data/New-SampleData.ps1',
            'scripts/Get-AdUsers.ps1'
          )
          foreach ($file in $files) {
            $resolved = Resolve-Path $file
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($resolved, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors) {
              $errors | Format-List | Out-String | Write-Error
              throw "PowerShell parse errors in $resolved"
            }
          }

  frontend:
    name: Frontend-Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: JS-Syntax pruefen
        working-directory: app
        run: npm run check

      - name: Frontend-Parity-Tests (mock.js vs. Backend)
        working-directory: app
        run: npm test

  source-limits:
    name: Source-Line-Limits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Max 300 Zeilen je Quelldatei
        shell: bash
        run: |
          set -euo pipefail
          limit=300
          failed=0
          while IFS= read -r file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt "$limit" ]; then
              echo "::error file=$file::${file}: ${lines} lines exceed ${limit}"
              failed=1
            fi
          done < <(git ls-files '*.rs' '*.js' '*.css' '*.html')
          exit "$failed"

  audit:
    name: Dependency-Audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: cargo-audit installieren
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Sicherheits-Advisories pruefen
        working-directory: app/src-tauri
        run: cargo audit --deny warnings

  build:
    name: Tauri-Build (Windows)
    runs-on: windows-latest
    needs: [backend, frontend, source-limits]
    steps:
      - uses: actions/checkout@v5

      - name: Node einrichten
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Cargo-Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-tauri-deps-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-deps-
            ${{ runner.os }}-cargo-deps-

      - name: Frontend-Abhaengigkeiten installieren
        working-directory: app
        run: npm ci

      - name: Tauri-App bauen
        working-directory: app
        run: npm run build

      - name: MSI-Artefakt hochladen
        uses: actions/upload-artifact@v5
        with:
          name: HardView-msi
          path: app/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
